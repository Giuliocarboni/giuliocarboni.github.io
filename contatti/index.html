<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link href="../assets/css/contatti.css" rel="stylesheet" />
    <title>Contatti - Giulio Carboni</title>
    <meta property="og:title" content="Contatti - Giulio Carboni" />
    <meta property="og:description" content="Mettiamoci in contatto!" />
    <meta
      property="og:image"
      content="https://giuliocarboni.github.io/assets/images/open-graph/meta-og-logo.png" />
    <meta
      property="og:url"
      content="https://giuliocarboni.github.io/contatti/" />
    <meta property="og:type" content="website" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://cal.eu/" rel="preconnect" />
    <link href="https://cal.eu/" rel="dns-prefetch" />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Geist:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer" />
    <link
      href="../assets/images/favicon/apple-touch-icon.png"
      rel="apple-touch-icon"
      sizes="180x180" />
    <link
      href="../assets/images/favicon/favicon-32x32.png"
      rel="icon"
      sizes="32x32"
      type="image/png" />
    <link
      href="../assets/images/favicon/favicon-16x16.png"
      rel="icon"
      sizes="16x16"
      type="image/png" />
    <link href="../assets/images/favicon/site.webmanifest" rel="manifest" />
    <script defer src="../script/form-script.js"></script>
    <script defer src="../script/footer-year-auto-update.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
      type="text/javascript"></script>
    <script async defer src="https://www.google.com/recaptcha/api.js"></script>
  </head>

  <body>
    <header>
      <nav class="navbar">
        <div class="home">
          <a href="../"><span>Giulio Carboni</span></a>
        </div>
        <div class="pages">
          <ul>
            <li>
              <a href="../">
                <i class="fa-solid fa-house"></i>
                <span class="navbar-text">Home</span>
              </a>
            </li>
            <li>
              <a href="../progetti/">
                <i class="fa-solid fa-code"></i>
                <span class="navbar-text">Progetti</span>
              </a>
            </li>
            <!-- <li>
              <a href>
                <i class="fa-solid fa-file-lines"></i>
                <span class="navbar-text">Blog</span>
              </a>
            </li> -->
            <li>
              <a href="#" class="active">
                <i class="fa-solid fa-at"></i>
                <span class="navbar-text">Contatti</span>
              </a>
            </li>
          </ul>
        </div>
        <div class="social-links">
          <ul>
            <li>
              <a
                href="https://github.com/Giuliocarboni"
                rel="noopener"
                target="_blank">
                <i class="fa-brands fa-github"></i>
                <span class="navbar-text">GitHub</span>
              </a>
            </li>
            <li>
              <a
                href="https://www.linkedin.com/in/giulio-carboni-6a926a41b/?skipRedirect=true"
                rel="noopener"
                target="_blank">
                <i class="fa-brands fa-linkedin"></i>
                <span class="navbar-text">LinkedIn</span>
              </a>
            </li>
          </ul>
        </div>
      </nav>
    </header>
    <main>
      <div class="contact-section">
        <div class="contact-section-text">
          <span class="contact-section-text-title"
            >Mettiamoci in contatto!</span
          >
          <span class="contact-section-text-subtitle"
            >Puoi scrivermi un messaggio veloce compilando il modulo qui sotto,
            oppure, se preferisci, puoi prenotare direttamente una chiamata
            conoscitiva
            <a
              class="booking-link"
              href="https://www.cal.eu/giuliocarboni/30min"
              rel="noopener noreferrer"
              target="_blank">
              <b>cliccando qui</b></a
            >.</span
          >
        </div>
        <form class="fs-form" id="contact-form">
          <input
            aria-label="Nome completo"
            autocomplete="name"
            class="fs-input"
            maxlength="50"
            name="name"
            placeholder="Nome"
            required
            type="text" />
          <input
            aria-label="Indirizzo Email"
            autocomplete="email"
            class="fs-input"
            name="email"
            placeholder="Email"
            required
            type="email" />
          <textarea
            aria-label="Testo del messaggio"
            class="fs-textarea"
            maxlength="10000"
            name="message"
            placeholder="Il tuo messaggio"
            required></textarea>
          <div
            class="g-recaptcha"
            data-sitekey="6Lc-GB0tAAAAAAClix84NqNwEJnp9rOJk47YABF8"></div>
          <div class="fs-button-group">
            <button class="fs-button" type="submit">Invio</button>
            <span class="submit-text"></span>
            <div class="toast-container" id="toast-container">
              <div class="toast" id="toast">
                <span id="toast-message"></span>
              </div>
            </div>
          </div>
        </form>
      </div>
    </main>
    <footer>
      <div class="footer-container">
        <div class="footer-social-links">
          <ul>
            <li>
              <a
                href="https://github.com/Giuliocarboni"
                rel="noopener"
                target="_blank"
                aria-label="Link GitHub">
                <i class="fa-brands fa-github"></i>
              </a>
            </li>
            <li>
              <a
                href="https://www.linkedin.com/in/giulio-carboni-6a926a41b/?skipRedirect=true"
                rel="noopener"
                target="_blank">
                <i class="fa-brands fa-linkedin"></i>
              </a>
            </li>
          </ul>
        </div>
        <p class="copyright">
          &copy; <span id="current-year"></span> Giulio Carboni
        </p>
      </div>
    </footer>
  </body>
</html>
